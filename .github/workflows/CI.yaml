name: CI

on:
  pull_request:
    branches:
      - "main"
  schedule:
    # At 07:00 UTC on Monday and Thursday
    - cron: "0 7 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  # Probably overly cautious group naming.
  # Commits to develop/master will cancel each other, but PRs will only cancel
  # commits within the same PR
  group: "${{ github.ref }}-${{ github.head_ref }}"
  cancel-in-progress: true

defaults:
  run:
    shell: bash -leo pipefail {0}

jobs:
  test:
    name: Test on ${{ matrix.os }}, Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-15-intel, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Additional info about the build
        run: |
          uname -a
          df -h
          ulimit -a

      - name: Get current date
        id: date
        run: echo "date=$(date +%Y-%m-%d)" >> "${GITHUB_OUTPUT}"

      - uses: mamba-org/setup-micromamba@v3
        with:
          micromamba-binary-path: ~/.local/bin/micromamba
          environment-file: environment.yaml
          environment-name: lomap-env
          cache-environment: true
          cache-downloads: true
          create-args: >-
            python=${{ matrix.python-version }}
          init-shell: bash

      - name: Install package
        run: python -m pip install --no-deps -v -e .

      - name: Test imports
        run: |
          python -Ic "import lomap; print(lomap.__version__)"

      - name: Environment Information
        run: |
          micromamba info
          micromamba list

      - name: Test the package
        run: pytest -vv 

      - name: Codecov
        uses: codecov/codecov-action@v5
        if: ${{ github.repository == 'OpenFreeEnergy/Lomap'
                && github.event_name == 'pull_request' }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: coverage.xml
          fail_ci_if_error: False
          verbose: True
